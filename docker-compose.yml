services:
  pollen-air-ha:
    image: ghcr.io/gefl24/pollen-air-ha:latest
    build: .
    container_name: pollen-air-ha
    restart: unless-stopped
    environment:
      LOCATION_NAME: "Hohhot"
      LAT: "40.8426"
      LON: "111.7492"
      CITY_ID: "101081101"
      FORECAST_SOURCE: "weather.com.cn"
      REFRESH_SECONDS: "1800"
      REQUEST_TIMEOUT: "20"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
